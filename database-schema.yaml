version: 1
project: mini-jira-backend
database:
  engine: postgresql
  version: "16"
  timezone: UTC
  naming_convention:
    tables: snake_case_plural
    columns: snake_case
    indexes: idx_<table>_<column>
    foreign_keys: fk_<table>_<ref_table>
    uniques: uq_<table>_<column>

enums:
  user_role:
    values:
      - admin
      - member

  ticket_status:
    values:
      - TODO
      - IN_PROGRESS
      - REVIEW
      - DONE

  ticket_priority:
    values:
      - LOW
      - MEDIUM
      - HIGH

  session_status:
    values:
      - ACTIVE
      - EXPIRED
      - REVOKED

  notification_type:
    values:
      - TICKET_ASSIGNED
      - COMMENT_ADDED
      - COMMENT_MENTION

  notification_status:
    values:
      - PENDING
      - SENT
      - CANCELLED
      - FAILED

tables:
  users:
    description: Usuarios aprovisionados por admin y autenticados vía Google Workspace
    columns:
      id:
        type: uuid
        primary_key: true
        default: gen_random_uuid()
      email:
        type: varchar(255)
        nullable: false
        unique: true
      name:
        type: varchar(255)
        nullable: false
      handle:
        type: varchar(80)
        nullable: false
        unique: true
      role:
        type: enum(user_role)
        nullable: false
        default: member
      is_active:
        type: boolean
        nullable: false
        default: true
      google_subject:
        type: varchar(255)
        nullable: true
        unique: true
      avatar_url:
        type: text
        nullable: true
      last_login_at:
        type: timestamptz
        nullable: true
      created_at:
        type: timestamptz
        nullable: false
        default: now()
      updated_at:
        type: timestamptz
        nullable: false
        default: now()
    indexes:
      - columns: [role]
      - columns: [is_active]
    checks:
      - name: ck_users_email_not_blank
        expression: "btrim(email) <> ''"
      - name: ck_users_name_not_blank
        expression: "btrim(name) <> ''"
      - name: ck_users_handle_not_blank
        expression: "btrim(handle) <> ''"

  auth_sessions:
    description: Sesiones web persistidas para cookie HttpOnly
    columns:
      id:
        type: uuid
        primary_key: true
        default: gen_random_uuid()
      user_id:
        type: uuid
        nullable: false
        references:
          table: users
          column: id
          on_delete: cascade
      session_token:
        type: varchar(255)
        nullable: false
        unique: true
      status:
        type: enum(session_status)
        nullable: false
        default: ACTIVE
      ip_address:
        type: varchar(64)
        nullable: true
      user_agent:
        type: text
        nullable: true
      expires_at:
        type: timestamptz
        nullable: false
      last_seen_at:
        type: timestamptz
        nullable: true
      created_at:
        type: timestamptz
        nullable: false
        default: now()
      updated_at:
        type: timestamptz
        nullable: false
        default: now()
    indexes:
      - columns: [user_id]
      - columns: [status]
      - columns: [expires_at]

  oauth_states:
    description: Estados temporales del flujo OAuth para protección CSRF
    columns:
      id:
        type: uuid
        primary_key: true
        default: gen_random_uuid()
      state:
        type: varchar(255)
        nullable: false
        unique: true
      provider:
        type: varchar(50)
        nullable: false
        default: google
      redirect_uri:
        type: text
        nullable: true
      expires_at:
        type: timestamptz
        nullable: false
      consumed_at:
        type: timestamptz
        nullable: true
      created_at:
        type: timestamptz
        nullable: false
        default: now()
    indexes:
      - columns: [expires_at]

  tickets:
    description: Tickets activos o archivados del tablero Kanban
    columns:
      id:
        type: uuid
        primary_key: true
        default: gen_random_uuid()
      title:
        type: varchar(120)
        nullable: false
      description:
        type: text
        nullable: true
      status:
        type: enum(ticket_status)
        nullable: false
        default: TODO
      priority:
        type: enum(ticket_priority)
        nullable: false
      is_blocked:
        type: boolean
        nullable: false
        default: false
      version:
        type: integer
        nullable: false
        default: 1
      created_by:
        type: uuid
        nullable: false
        references:
          table: users
          column: id
          on_delete: restrict
      archived_at:
        type: timestamptz
        nullable: true
      created_at:
        type: timestamptz
        nullable: false
        default: now()
      updated_at:
        type: timestamptz
        nullable: false
        default: now()
    indexes:
      - columns: [created_by]
      - columns: [status]
      - columns: [priority]
      - columns: [created_at]
      - columns: [archived_at]
    checks:
      - name: ck_tickets_title_not_blank
        expression: "btrim(title) <> ''"
      - name: ck_tickets_version_positive
        expression: "version >= 1"

  ticket_assignees:
    description: Relación N:N entre tickets y usuarios asignados
    columns:
      ticket_id:
        type: uuid
        nullable: false
        references:
          table: tickets
          column: id
          on_delete: cascade
      user_id:
        type: uuid
        nullable: false
        references:
          table: users
          column: id
          on_delete: cascade
      assigned_at:
        type: timestamptz
        nullable: false
        default: now()
    primary_key:
      columns: [ticket_id, user_id]
    indexes:
      - columns: [user_id]

  ticket_labels:
    description: Etiquetas libres por ticket
    columns:
      ticket_id:
        type: uuid
        nullable: false
        references:
          table: tickets
          column: id
          on_delete: cascade
      label:
        type: varchar(100)
        nullable: false
      created_at:
        type: timestamptz
        nullable: false
        default: now()
    primary_key:
      columns: [ticket_id, label]
    checks:
      - name: ck_ticket_labels_not_blank
        expression: "btrim(label) <> ''"

  comments:
    description: Comentarios editables en Markdown asociados a tickets
    columns:
      id:
        type: uuid
        primary_key: true
        default: gen_random_uuid()
      ticket_id:
        type: uuid
        nullable: false
        references:
          table: tickets
          column: id
          on_delete: cascade
      author_id:
        type: uuid
        nullable: false
        references:
          table: users
          column: id
          on_delete: restrict
      body:
        type: text
        nullable: false
      archived_at:
        type: timestamptz
        nullable: true
      created_at:
        type: timestamptz
        nullable: false
        default: now()
      updated_at:
        type: timestamptz
        nullable: false
        default: now()
    indexes:
      - columns: [ticket_id]
      - columns: [author_id]
      - columns: [archived_at]
    checks:
      - name: ck_comments_body_not_blank
        expression: "btrim(body) <> ''"

  comment_mentions:
    description: Menciones resueltas a partir de @handle dentro de comentarios
    columns:
      comment_id:
        type: uuid
        nullable: false
        references:
          table: comments
          column: id
          on_delete: cascade
      mentioned_user_id:
        type: uuid
        nullable: false
        references:
          table: users
          column: id
          on_delete: cascade
      created_at:
        type: timestamptz
        nullable: false
        default: now()
    primary_key:
      columns: [comment_id, mentioned_user_id]
    indexes:
      - columns: [mentioned_user_id]

  email_notifications:
    description: Cola y estado de notificaciones por email
    columns:
      id:
        type: uuid
        primary_key: true
        default: gen_random_uuid()
      type:
        type: enum(notification_type)
        nullable: false
      status:
        type: enum(notification_status)
        nullable: false
        default: PENDING
      recipient_user_id:
        type: uuid
        nullable: false
        references:
          table: users
          column: id
          on_delete: cascade
      ticket_id:
        type: uuid
        nullable: true
        references:
          table: tickets
          column: id
          on_delete: cascade
      comment_id:
        type: uuid
        nullable: true
        references:
          table: comments
          column: id
          on_delete: cascade
      payload_json:
        type: jsonb
        nullable: true
      error_message:
        type: text
        nullable: true
      scheduled_for:
        type: timestamptz
        nullable: true
      sent_at:
        type: timestamptz
        nullable: true
      cancelled_at:
        type: timestamptz
        nullable: true
      failed_at:
        type: timestamptz
        nullable: true
      created_at:
        type: timestamptz
        nullable: false
        default: now()
      updated_at:
        type: timestamptz
        nullable: false
        default: now()
    indexes:
      - columns: [recipient_user_id]
      - columns: [status]
      - columns: [type]
      - columns: [scheduled_for]
      - columns: [ticket_id]
      - columns: [comment_id]

relationships:
  - from: auth_sessions.user_id
    to: users.id
    type: many_to_one

  - from: tickets.created_by
    to: users.id
    type: many_to_one

  - from: ticket_assignees.ticket_id
    to: tickets.id
    type: many_to_one

  - from: ticket_assignees.user_id
    to: users.id
    type: many_to_one

  - from: ticket_labels.ticket_id
    to: tickets.id
    type: many_to_one

  - from: comments.ticket_id
    to: tickets.id
    type: many_to_one

  - from: comments.author_id
    to: users.id
    type: many_to_one

  - from: comment_mentions.comment_id
    to: comments.id
    type: many_to_one

  - from: comment_mentions.mentioned_user_id
    to: users.id
    type: many_to_one

  - from: email_notifications.recipient_user_id
    to: users.id
    type: many_to_one

  - from: email_notifications.ticket_id
    to: tickets.id
    type: many_to_one

  - from: email_notifications.comment_id
    to: comments.id
    type: many_to_one

business_rules:
  - name: optimistic_locking_tickets
    description: Toda actualización de ticket debe condicionar por id y version; si no afecta filas, devolver 409
  - name: member_cannot_modify_foreign_ticket
    description: member solo puede editar, cambiar estado o archivar tickets propios
  - name: member_cannot_archive_foreign_comment
    description: member solo puede archivar comentarios propios
  - name: blocked_flag_does_not_change_status
    description: is_blocked es lateral y no altera el enum status
  - name: archive_is_soft_delete
    description: archivar ticket o comentario marca archived_at y no elimina físicamente
  - name: archived_ticket_hidden_from_active_board
    description: tickets con archived_at no aparecen en el tablero activo
  - name: archived_tickets_count_in_historical_metrics
    description: tickets archivados siguen contando en métricas históricas cuando corresponda
  - name: comment_archive_cancels_pending_email
    description: si el comentario origen se archiva antes del despacho, la notificación pendiente se cancela
  - name: export_csv_uses_dashboard_filters
    description: el export usa exactamente los mismos filtros del dashboard

notes:
  - El esquema está pensado para Drizzle ORM sobre PostgreSQL.
  - updated_at puede mantenerse con lógica de aplicación o trigger de base de datos según la estrategia de implementación.
  - auth_sessions.session_token debe almacenarse hasheado si el diseño final de seguridad así lo exige.
  - oauth_states puede limpiarse por TTL/cron o job programado.
  - email_notifications funciona como cola persistente simple para v1.
